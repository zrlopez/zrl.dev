# Dependabot configuration — zrl.dev
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Automated dependency update PRs prevent silent accumulation of CVEs.
# Schedule: weekly (Monday, 09:00 CT). Both npm packages and GitHub Actions
# are monitored separately since they have different update cadences and
# different security implications.

version: 2
updates:

  # ── npm packages ─────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day:  monday
      time: "09:00"
      timezone: America/Chicago
    labels:
      - dependencies
    open-pull-requests-limit: 10
    groups:
      # Group minor and patch updates into a single weekly PR to reduce noise.
      # Security updates always get individual PRs regardless of grouping.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Next.js major versions require manual testing before upgrade.
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      # All other major version bumps require manual review — grouped PRs
      # are still created but must be approved explicitly before merging.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ──────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day:  monday
      time: "09:00"
      timezone: America/Chicago
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
