# ── CI Pipeline — zrl.dev ───────────────────────────────────────────────────────────────────
# Runs on every push and PR to main.
#
# SECURITY GATES (all must pass before Vercel auto-deploy proceeds):
#   secret-scan   → TruffleHog OSS full-history secret scan
#   dep-audit     → npm audit (high severity threshold)
#   type-check    → TypeScript strict compilation check
#   lint          → ESLint (Next.js ruleset)
#   sbom          → CycloneDX SBOM generation (provenance artifact)
#   build         → Production build (needs all above)
#
# All GitHub Actions are pinned to immutable commit SHAs, not mutable tags,
# to prevent supply-chain substitution attacks.
# ────────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid wasted compute.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default: minimal permissions. Each job overrides only what it needs.
permissions:
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for secret scan)
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0  # Full git history required for TruffleHog entropy analysis

      - name: TruffleHog OSS Secret Scan
        # trufflesecurity/trufflehog@v3 (latest stable SHA as of 2026-05)
        uses: trufflesecurity/trufflehog@d2f9bb14a4a050fcda0a6e4c81ac6c2c6cb0df05
        with:
          path:       ./
          base:       ${{ github.event.repository.default_branch }}
          extra_args: --only-verified --json

  # ───────────────────────────────────────────────────────────────────────────
  dep-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        # actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity threshold)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ───────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ───────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM Generation (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CycloneDX CLI
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate SBOM
        run: |
          cyclonedx-npm \
            --output-format json \
            --output-file sbom.json \
            --package-lock-only

      - name: Upload SBOM artifact
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30  # SBOM retained for compliance/audit trail

  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # All security and quality gates must pass before build.
    needs: [secret-scan, dep-audit, type-check, lint]
    env:
      # Stub secrets: real values exist only in Cloudflare / Vercel runtime.
      # These are placeholders to satisfy build-time env validation.
      RESEND_API_KEY:              ${{ secrets.RESEND_API_KEY              || 'ci-stub-resend-not-real' }}
      TURNSTILE_SECRET_KEY:        ${{ secrets.TURNSTILE_SECRET_KEY        || 'ci-stub-turnstile-not-real' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'ci-stub-sitekey-not-real' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build ID (traceability only)
        # Scoped to BUILD_ID only — not the full .next/ directory.
        # Avoids exposing compiled server internals and source maps as
        # a public artifact on this open-source repository.
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-id-${{ github.sha }}
          path: .next/BUILD_ID
          retention-days: 1
