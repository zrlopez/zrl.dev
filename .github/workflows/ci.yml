# ── CI Pipeline — zrl.dev ───────────────────────────────────────────────────────────────────
# Runs on every push and PR to main.
#
# SECURITY GATES (all must pass before build proceeds):
#   secret-scan   → TruffleHog OSS full-history secret scan
#   dep-audit     → npm audit (high severity threshold)
#   type-check    → TypeScript strict compilation check
#   lint          → ESLint (Next.js ruleset)
#   sbom          → CycloneDX SBOM generation (provenance artifact)
#   build         → Production build (needs all above)
#
# ACTION PINNING STRATEGY:
#   GitHub-owned actions (actions/*): pinned to immutable commit SHAs.
#   Third-party actions (trufflesecurity/*): pinned to the official v3
#   floating major-version tag, which is the documented stable reference
#   per https://github.com/trufflesecurity/trufflehog#octocat-trufflehog-github-action
#   TruffleHog v3 is actively maintained; patch/minor releases are
#   auto-included. Review release notes on Dependabot PRs.
# ────────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid wasted compute.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default: minimal permissions. Each job overrides only what it needs.
permissions:
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for secret scan)
        # actions/checkout@v4.2.2 — pinned to immutable SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Full git history required for TruffleHog to scan all commits

      - name: TruffleHog OSS Secret Scan
        # trufflesecurity/trufflehog@v3
        # Using official floating major-version tag per TruffleHog documentation.
        # SHA-pinning trufflehog requires pointing at a RELEASE commit SHA,
        # not an application source commit — using @v3 is the correct stable reference.
        # Dependabot (dependabot.yml) monitors this for version updates.
        uses: trufflesecurity/trufflehog@v3
        with:
          path:       ./
          extra_args: --only-verified

  # ───────────────────────────────────────────────────────────────────────────
  dep-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        # actions/setup-node@v4.4.0 — pinned to immutable SHA
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity threshold)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ───────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ───────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM Generation (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CycloneDX CLI
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate SBOM
        run: |
          cyclonedx-npm \
            --output-format json \
            --output-file sbom.json \
            --package-lock-only

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # All security and quality gates must pass before build.
    needs: [secret-scan, dep-audit, type-check, lint]
    env:
      # Stub secrets for CI build-time env validation.
      # Real values live only in Cloudflare Pages runtime — never in CI.
      RESEND_API_KEY:                 ${{ secrets.RESEND_API_KEY                 || 'ci-stub-resend-not-real' }}
      TURNSTILE_SECRET_KEY:           ${{ secrets.TURNSTILE_SECRET_KEY           || 'ci-stub-turnstile-not-real' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'ci-stub-sitekey-not-real' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build ID (traceability only)
        # Scoped to single-line BUILD_ID — not the full .next/ compiled output.
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-id-${{ github.sha }}
          path: .next/BUILD_ID
          retention-days: 1
