# ── CI Pipeline — zrl.dev ──────────────────────────────────────────────────────────────────
# Security gates:
#   1. secret-scan    — TruffleHog (verified secrets, full history)
#   2. codeql         — GitHub CodeQL SAST (JS/TS security queries)
#   3. quality        — TypeScript + ESLint + npm audit (high+)
#   4. build          — Production build verification
#
# All actions are pinned to SHA digests (not mutable tags).
# Concurrency: cancel redundant runs on the same branch.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same ref to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Secret Scanning (TruffleHog)
  # Scans full commit history for leaked credentials.
  # fetch-depth: 0 ensures entire history is scanned, not just HEAD.
  # Only verified secrets reported to minimize false positives.
  # ──────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        # actions/checkout v4.2.2 — SHA-pinned
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: CodeQL SAST
  # GitHub CodeQL analyzes JS/TS for security vulnerabilities.
  # Covers: injection, XSS, prototype pollution, SSRF, path traversal.
  # Free on public repositories. Results appear in Security tab.
  # ──────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      actions:          read
      contents:         read
      security-events:  write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        # github/codeql-action v3.28.15 — SHA-pinned
        uses: github/codeql-action/init@ce28f5bb42b1c7b4a7e04e4acf4be395539b3291
        with:
          languages: javascript-typescript
          queries:   security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce28f5bb42b1c7b4a7e04e4acf4be395539b3291

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce28f5bb42b1c7b4a7e04e4acf4be395539b3291
        with:
          category: /language:javascript-typescript

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: Code Quality (TypeScript + ESLint + npm audit)
  # ──────────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js 22
        # actions/setup-node v4.4.0 — SHA-pinned
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (lockfile-strict)
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings=0

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: Production Build Verification
  # Depends on quality — build only runs on clean code.
  # Artifact scoped to BUILD_ID only (not full .next/ directory).
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'

      - name: Upload build ID for traceability
        # actions/upload-artifact v4.6.2 — SHA-pinned
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: success()
        with:
          name: build-id-${{ github.sha }}
          path: .next/BUILD_ID
          retention-days: 1
