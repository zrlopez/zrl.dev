# ── CI Pipeline — zrl.dev ───────────────────────────────────────────────────────────────────
# Runs on every push and PR to main.
#
# SECURITY GATES (all must pass before build proceeds):
#   secret-scan   → TruffleHog OSS full-history secret scan
#   dep-audit     → npm audit (high severity threshold)
#   type-check    → TypeScript strict compilation check
#   lint          → ESLint (Next.js ruleset)
#   sbom          → CycloneDX SBOM generation (provenance artifact)
#   build         → Production build (needs all above)
#
# ACTION PINNING STRATEGY:
#   GitHub-owned actions (actions/*): pinned to immutable commit SHAs.
#   Third-party actions (trufflesecurity/*): pinned to v3.95.3 (tag SHA: 37b77001).
#   TruffleHog v3.95.3+ requires Node 24 for its action runtime — a setup-node
#   step is included in the secret-scan job to satisfy this requirement.
#   Dependabot (dependabot.yml) monitors trufflehog for version updates.
# ────────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid wasted compute.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default: minimal permissions. Each job overrides only what it needs.
permissions:
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for secret scan)
        # actions/checkout@v6 — pinned to immutable SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Full git history required for TruffleHog to scan all commits

      - name: Setup Node 24 (required by TruffleHog action runtime v3.95.3+)
        # actions/setup-node@v6.4.0 — pinned to immutable SHA
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'

      - name: TruffleHog OSS Secret Scan
        # trufflesecurity/trufflehog@v3.95.3 — pinned to immutable tag SHA 37b77001
        # v3.95.3 bumped internal JS action runtime to Node 24 (see release notes).
        # Node 24 setup step above satisfies this requirement.
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path:       ./
          extra_args: --only-verified

  # ───────────────────────────────────────────────────────────────────────────
  dep-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        # actions/setup-node@v6.4.0 — pinned to immutable SHA
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity threshold)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ───────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ───────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM Generation (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CycloneDX CLI
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate SBOM
        run: |
          cyclonedx-npm \
            --output-format json \
            --output-file sbom.json \
            --package-lock-only

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # All security and quality gates must pass before build.
    needs: [secret-scan, dep-audit, type-check, lint]
    env:
      # Stub secrets for CI build-time env validation.
      # Real values live only in Cloudflare Pages runtime — never in CI.
      RESEND_API_KEY:                 ${{ secrets.RESEND_API_KEY                 || 'ci-stub-resend-not-real' }}
      TURNSTILE_SECRET_KEY:           ${{ secrets.TURNSTILE_SECRET_KEY           || 'ci-stub-turnstile-not-real' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'ci-stub-sitekey-not-real' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build ID (traceability only)
        # Scoped to single-line BUILD_ID — not the full .next/ compiled output.
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-id-${{ github.sha }}
          path: .next/BUILD_ID
          retention-days: 1
