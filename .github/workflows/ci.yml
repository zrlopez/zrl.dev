# ── CI Pipeline — zrl.dev ────────────────────────────────────────────────────
# Runs on every push and pull request to main.
# Gates: type-check → lint → dependency audit → build
# All gates must pass before Vercel auto-deploy proceeds.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity threshold)
        run: npm audit --audit-level=high

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [security-audit, type-check, lint]
    env:
      # Provide stub secrets so next build doesn't fail env validation.
      # Real secrets are only present in Vercel's runtime environment.
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'ci-stub-not-real' }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY || 'ci-stub-not-real' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || 'ci-stub-not-real' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact (for inspection)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: next-build-${{ github.sha }}
          path: .next/
          retention-days: 3
