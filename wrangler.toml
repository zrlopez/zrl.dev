name = "zrl-dev-site"
compatibility_date = "2024-09-26"

# Main production environment
[env.production]
name = "zrl-dev-site"
routes = [
  { pattern = "zrl.dev/*", zone_name = "zrl.dev" },
  { pattern = "zrlo.dev/*", zone_name = "zrlo.dev" },
  { pattern = "zrlopez.dev/*", zone_name = "zrlopez.dev" }
]

# Preview environment for non-production branches
[env.preview]
name = "zrl-dev-site-preview"

# Site configuration
[site]
bucket = "./dist"  # or your build output directory

# Custom domains and redirects
[[redirects]]
from = "zrlo.dev/*"
to = "https://zrl.dev/:splat"
status = 301

[[redirects]]
from = "zrlopez.dev/*"
to = "https://zrl.dev/:splat"
status = 301